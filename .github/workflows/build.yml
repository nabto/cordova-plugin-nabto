name: build

# Validate the plugin on every pull request and on every push to the default
# branch by packaging it and building it into a throwaway Cordova app on both
# supported platforms. The iOS build exercises the Swift Package Manager
# integration (Package.swift) and the Android build exercises the gradle/Ivy
# AAR resolution (src/android/NabtoCordova.gradle).

on:
  pull_request:
  push:
    branches: [master]

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  version-consistency:
    name: version files in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: package.json and plugin.xml versions must match
        run: |
          set -euo pipefail
          PKG=$(node -p "require('./package.json').version")
          XML=$(sed -nE 's|^[[:space:]]*version="([^"]*)">|\1|p' plugin.xml | head -n1)
          echo "package.json=$PKG plugin.xml=$XML"
          [ "$PKG" = "$XML" ] || { echo "ERROR: package.json ($PKG) != plugin.xml ($XML)" >&2; exit 1; }

  pack:
    name: npm pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The iOS NabtoClient library is resolved at app build time via Swift Package Manager
      # (see Package.swift), not vendored, so packaging the plugin is just `npm pack`.
      - name: Build npm package
        run: npm pack

      - name: Upload package tarball
        uses: actions/upload-artifact@v4
        with:
          name: cordova-plugin-nabto-npm
          path: cordova-plugin-nabto-*.tgz
          if-no-files-found: error

  android:
    name: Android build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build plugin into a test app
        run: |
          set -euxo pipefail
          APP="$RUNNER_TEMP/testapp"
          cordova create "$APP" com.nabto.plugintest PluginTest
          cd "$APP"
          cordova platform add android
          cordova plugin add "$GITHUB_WORKSPACE"
          cordova build android

  ios:
    name: iOS build (SPM)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build plugin into a test app
        run: |
          set -euxo pipefail
          APP="$RUNNER_TEMP/testapp"
          cordova create "$APP" com.nabto.plugintest PluginTest
          cd "$APP"
          # cordova-ios 8 is required for the Swift Package Manager integration.
          cordova platform add ios@8
          cordova plugin add "$GITHUB_WORKSPACE"
          # Build for the simulator so the build does not require code signing.
          cordova build ios --emulator
