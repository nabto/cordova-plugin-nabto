name: release

# Pushing a tag that starts with "v" (created by `npm version`, see RELEASE_PROCEDURE.md)
# STAGES the package to npm via OIDC trusted publishing (no tokens, no 2FA). The staged
# version is NOT live until a maintainer approves it with 2FA (`npm stage approve <id>` or
# the npmjs.com "Staged Packages" tab). The version comes from the committed package.json
# (the source of truth); the tag must match it.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write     # OIDC trusted publishing to npm

env:
  CI: "true"

jobs:
  publish:
    name: Stage publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # NOTE: do NOT set `registry-url` here. It makes setup-node write an .npmrc with a
      # `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` line; with no token set that
      # forces empty token-auth and the publish fails with E401, shadowing OIDC. Trusted
      # publishing authenticates via the OIDC id-token instead, so we must leave token auth
      # unconfigured. The default registry is registry.npmjs.org, which is what we want.
      - uses: actions/setup-node@v6
        with:
          node-version: 26                       # staged publishing needs Node >= 22.14.0
          package-manager-cache: false  # never use caching in release builds

      - name: Use a staged-publishing-capable npm
        run: npm install -g npm@latest            # staged publishing needs npm >= 11.15.0

      - name: Verify tag matches committed version
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"           # v3.0.1 -> 3.0.1
          PKG=$(node -p "require('./package.json').version")
          if [ "$PKG" != "$VERSION" ]; then
            echo "ERROR: tag $GITHUB_REF_NAME (=$VERSION) != package.json $PKG. Bump with 'npm version' before tagging." >&2
            exit 1
          fi

      - name: Determine npm dist-tag
        id: disttag
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"           # v3.1.0-rc1 -> 3.1.0-rc1
          # Only a clean semver (no pre-release suffix) may take the default `latest`
          # dist-tag; otherwise `npm install cordova-plugin-nabto` would resolve to a
          # pre-release. A version like 3.1.0-rc1 / 3.1.0-alpha.0 / 3.1.0-beta.2 is staged
          # under a channel dist-tag derived from its pre-release identifier (rc / alpha / beta).
          if [[ "$VERSION" == *-* ]]; then
            PRE="${VERSION#*-}"                     # rc1 | alpha.0 | beta.2
            CHANNEL="${PRE%%[._0-9]*}"             # rc  | alpha   | beta   (strip from first digit/dot)
            [ -n "$CHANNEL" ] || CHANNEL="prerelease"
            echo "tag_arg=--tag $CHANNEL" >> "$GITHUB_OUTPUT"
            echo "::notice::Pre-release $VERSION -> staging under the '$CHANNEL' dist-tag (not 'latest')."
          else
            echo "tag_arg=" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage publish to npm (OIDC; awaits maintainer 2FA approval)
        run: |
          npm stage publish ${{ steps.disttag.outputs.tag_arg }}
          echo "::notice::Staged cordova-plugin-nabto - NOT live yet. Approve it (2FA) via" \
               "'npm stage approve <id>' or the npmjs.com Staged Packages tab."
